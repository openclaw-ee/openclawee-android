org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# ARM64 Linux workaround: Android SDK ships x86_64 aapt2; this wrapper uses QEMU to run it.
# Generated by tools/setup-aapt2-arm64.sh — update if the path changes after a reboot.
# On x86_64 machines, remove this line.
android.aapt2FromMavenOverride=/tmp/openclaw-arm64-build/aapt2
